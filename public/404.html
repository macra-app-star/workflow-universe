<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 — Page Not Found | Workflow Universe</title>
  <meta name="theme-color" content="#0a0a0a">
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Cpath d='M18 2L6 18h8l-2 12 12-16h-8l2-12z' fill='%233b82f6'/%3E%3C/svg%3E">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0a0a0a;
      color: #e5e5e5;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      text-align: center;
      padding: 24px;
      -webkit-font-smoothing: antialiased;
    }

    .error-code {
      font-size: clamp(5rem, 15vw, 10rem);
      font-weight: 800;
      letter-spacing: -0.04em;
      color: #1e1e1e;
      line-height: 1;
      margin-bottom: 8px;
    }

    h1 {
      font-size: clamp(1.25rem, 3vw, 1.75rem);
      font-weight: 700;
      letter-spacing: -0.02em;
      margin-bottom: 12px;
    }

    p {
      color: #888;
      font-size: 1rem;
      max-width: 420px;
      line-height: 1.6;
      margin-bottom: 32px;
    }

    .home-link {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: #3b82f6;
      color: #fff;
      font-weight: 600;
      font-size: 1rem;
      padding: 14px 32px;
      border-radius: 10px;
      text-decoration: none;
      transition: background 0.2s, transform 0.15s;
      box-shadow: 0 0 24px rgba(59, 130, 246, 0.25);
    }

    .home-link:hover {
      background: #2563eb;
      transform: translateY(-1px);
    }

    .home-link:focus-visible {
      outline: 2px solid #3b82f6;
      outline-offset: 2px;
    }

    .brand {
      position: absolute;
      top: 24px;
      left: 24px;
      font-weight: 700;
      font-size: 1rem;
      color: #e5e5e5;
      text-decoration: none;
    }

    .brand span { color: #3b82f6; }
  </style>
</head>
<body>
  <a href="/" class="brand">Workflow <span>Universe</span></a>
  <div class="error-code">404</div>
  <h1>Page not found</h1>
  <p>The workflow you are looking for does not exist or has been moved. Head back to the homepage to browse all 2,053 templates.</p>
  <a href="/" class="home-link">
    Back to Homepage
    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="none" viewBox="0 0 24 24" stroke-width="2.5" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M13.5 4.5 21 12m0 0-7.5 7.5M21 12H3"/></svg>
  </a>
</body>
</html>
